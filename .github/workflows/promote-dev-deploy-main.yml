# Promover dev → main y desplegar en el VPS sin usar la UI de Git a mano.
#
# Uso: GitHub → Actions → "Promote dev to main and deploy" → Run workflow
#
# Secrets del repositorio (Settings → Secrets and variables → Actions):
#   PROMOTE_PAT      (opcional) PAT con permiso contents:write si main está
#                    protegido y el GITHUB_TOKEN no puede hacer push.
#   DEPLOY_SSH_HOST  Host del VPS (ej. app.fparmychapters.com o IP).
#   DEPLOY_SSH_USER  Usuario SSH (ej. root o admin).
#   DEPLOY_SSH_KEY   Clave privada PEM (contenido completo de ~/.ssh/id_rsa).
#   DEPLOY_WEB_ROOT  Ruta absoluta al clone en el servidor, ej.:
#                    /home/admin/web/app.fparmychapters.com/public_html
#   DEPLOY_SUDO_USER (opcional) Si no está vacío, el deploy se ejecuta como:
#                    sudo -u "$DEPLOY_SUDO_USER" bash -lc 'cd ... && deploy...'
#                    Ej.: admin  (deja vacío si entras ya como el usuario dueño del clone)

name: Promote dev to main and deploy

on:
  workflow_dispatch:
    inputs:
      solo_deploy:
        description: "Solo desplegar main (omitir merge dev → main)"
        type: boolean
        default: false

concurrency:
  group: promote-deploy-app-fparmychapters
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        if: ${{ !inputs.solo_deploy }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PROMOTE_PAT || github.token }}

      - name: Merge dev into main and push
        if: ${{ !inputs.solo_deploy }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main dev
          git checkout -B main origin/main
          git merge origin/dev --no-ff -m "chore: merge dev into main (workflow promote)"
          git push origin main

      - name: Deploy on VPS (deploy-from-github.sh, branch main)
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_WEB_ROOT: ${{ secrets.DEPLOY_WEB_ROOT }}
          DEPLOY_SUDO_USER: ${{ secrets.DEPLOY_SUDO_USER }}
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_WEB_ROOT,DEPLOY_SUDO_USER
          script_stop: true
          script: |
            set -euo pipefail
            if [ -z "${DEPLOY_WEB_ROOT:-}" ]; then
              echo "DEPLOY_WEB_ROOT is not set on the runner secrets."
              exit 1
            fi
            if [ -n "${DEPLOY_SUDO_USER:-}" ]; then
              sudo -u "$DEPLOY_SUDO_USER" bash -lc "cd \"$DEPLOY_WEB_ROOT\" && bash scripts/deploy-from-github.sh"
            else
              cd "$DEPLOY_WEB_ROOT"
              bash scripts/deploy-from-github.sh
            fi
